<!DOCTYPE html>
<html>

<head>

    <title>Digital Twin Factory API</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
        }

        .portal-header{
            background:#212529;
            color:white;
            text-align:center;
            padding:25px;
        }

        .portal-card{

            border:none;

            border-radius:20px;

            transition:0.3s;

            cursor:pointer;

            box-shadow:
            0 4px 15px rgba(
                0,
                0,
                0,
                0.1
            );
        }

        .portal-card:hover{
            transform:translateY(-5px);
        }

        a{
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="portal-header">

    <h1>
        🏭 Digital Twin Factory API
    </h1>

</div>

<div class="container mt-5">

    <div class="row g-4">

        <div class="col-md-4">

            <a href="/admin/">

                <div class="card portal-card">

                    <div class="card-body text-center">

                        <h3>⚙ Admin</h3>

                    </div>

                </div>

            </a>

        </div>

        <div class="col-md-4">

            <a href="/swagger/">

                <div class="card portal-card">

                    <div class="card-body text-center">

                        <h3>📄 Swagger</h3>

                    </div>

                </div>

            </a>

        </div>

        <div class="col-md-4">

            <a href="/api/machines/">

                <div class="card portal-card">

                    <div class="card-body text-center">

                        <h3>🔗 API</h3>

                    </div>

                </div>

            </a>

        </div>

    </div>

</div>

</body>

</html>
